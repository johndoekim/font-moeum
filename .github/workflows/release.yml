name: Release

# 목적: font-moeum 배포 바이너리(Windows NSIS/MSI + 무설치 포터블 zip ·
# macOS .app/.dmg · Linux AppImage/deb)를 3개 러너 매트릭스에서 빌드한다.
#
# 트리거 2종:
#   - workflow_dispatch: 드라이런 — 3 OS 빌드 + artifact 업로드만, Release 생성 없음.
#     (실제 태그를 찍기 전에 워크플로 자체가 살아있는지 확인하는 용도)
#   - push tags 'v*': draft Release 생성 + 번들 첨부.
#
# 서명·공증은 범위 밖(README "설치" 절 참고) — SmartScreen/Gatekeeper 경고는
# 사용자가 직접 우회해야 한다.

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # windows-latest = x86_64 · macos-latest = aarch64(Apple Silicon —
        # Intel Mac은 범위 외, README에 소스 빌드로 안내됨) · ubuntu-22.04 =
        # x86_64 glibc. scripts/build_sidecar.py가 `rustc -vV`의 host triple로
        # 사이드카 파일명을 짓고 Tauri externalBin이 그 접미사를 요구하므로,
        # 이 세 러너의 host triple이 각각 x86_64-pc-windows-msvc /
        # aarch64-apple-darwin / x86_64-unknown-linux-gnu와 일치해야 한다
        # (아래 "사이드카 스모크 테스트" 스텝의 glob이 이 가정에 기댄다).
        os: [windows-latest, macos-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90 # 스모크 readline 무한대기 이월 minor의 공식 해소 계층
    permissions:
      contents: write # 태그 푸시 시 draft Release 생성에 필요 (드라이런에서는 미사용)
    steps:
      - uses: actions/checkout@v7

      - name: Linux 빌드 의존성 설치 (Tauri v2 공식 요구사항)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # version 입력을 생략하면 package.json의 packageManager 필드(pnpm@9.12.0)를
      # 그대로 읽어 로컬 개발 환경과 CI의 pnpm 버전을 일치시킨다.
      - name: pnpm 설치
        uses: pnpm/action-setup@v6

      # cache: pnpm은 내부적으로 `pnpm store path`를 호출하므로 위 pnpm 설치
      # 스텝이 반드시 먼저 와야 한다.
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - uses: astral-sh/setup-uv@v7

      # dev 그룹(pytest 등)을 기본 포함 — 아래 스모크가 scripts/test_otf2ttf.py의
      # 픽스처를 import하므로 --no-dev는 금지 (scripts/smoke_sidecar.py 상단 문서 참고).
      - name: Python 병합 엔진 의존성 설치
        run: uv sync --directory scripts

      - name: 사이드카 선빌드
        run: pnpm build:sidecar

      # 사이드카 파일명이 러너별 rustc host triple로 갈리므로(윈도우는 .exe 접미사도
      # 붙는다) glob으로 한 개만 집어 넘긴다. 매치가 없으면(빌드 실패) ls가 비영시
      # 종료해 이 스텝 자체가 fail-fast로 실패한다(GitHub Actions bash 스텝은
      # set -eo pipefail로 실행됨).
      #
      # $PWD 접두는 필수 — `uv run --directory scripts`가 파이썬 프로세스의 CWD를
      # scripts/로 옮기므로, 상대경로를 넘기면 smoke_sidecar.py의
      # Path(argv[1]).resolve()가 scripts/src-tauri/...로 잘못 풀린다.
      # (샘플 폰트 경로는 __file__ 기준이라 CWD 무관 — argv의 exe 경로만 민감.)
      #
      # tauri-action(아래)보다 먼저 실행해 지연 테이블 누락 같은 사이드카 결함을
      # tauri 빌드 실패와 뒤섞이지 않게 여기서 격리한다 — beforeBuildCommand가
      # build:sidecar를 다시 돌려 ~1분 중복되지만 이 결정론을 우선한다.
      - name: 사이드카 스모크 테스트
        shell: bash
        run: |
          exe="$PWD/$(ls src-tauri/binaries/sidecar-*)"
          uv run --directory scripts python smoke_sidecar.py "$exe"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: 빌드 (드라이런, Release 생성 없음)
        if: github.event_name == 'workflow_dispatch'
        uses: tauri-apps/tauri-action@v0
        with:
          includeUpdaterJson: false # 업데이터 플러그인 미사용 — 서명 키 없음(범위 외)

      - name: 빌드 + Release 생성 (태그 푸시)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'font-moeum v__VERSION__'
          releaseDraft: true
          includeUpdaterJson: false

      # 무설치 포터블: tauri build가 target/release에 나란히 놓은 메인 exe와 사이드카
      # exe를 zip 하나로 묶는다(설치 없이 압축만 풀어 실행 — 사용자는 font-moeum.exe만
      # 더블클릭, 사이드카는 앱이 자식 프로세스로 자동 실행). bundle/portable/ 아래 두면
      # 아래 "드라이런 산출물 업로드"(bundle/**)가 자동으로 포함한다.
      - name: 무설치 포터블 ZIP 생성 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $rel = "src-tauri/target/release"
          $out = "$rel/bundle/portable"
          New-Item -ItemType Directory -Force $out | Out-Null
          Compress-Archive -Path "$rel/font-moeum.exe","$rel/sidecar.exe" `
            -DestinationPath "$out/font-moeum_${ver}_x64-portable.zip" -Force

      - name: 드라이런 산출물 업로드
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: font-moeum-${{ matrix.os }}
          path: src-tauri/target/release/bundle/**

      # 포터블 zip은 tauri-action이 만드는 산출물이 아니므로 draft Release에 직접 첨부한다.
      # 태그 푸시라 git tag가 이미 존재해 gh가 tag로 draft Release를 찾는다. --clobber로
      # 재실행 멱등성 확보. contents:write 권한은 위 job permissions에 이미 설정됨.
      - name: 포터블 ZIP을 Release에 첨부 (Windows, 태그 푸시)
        if: matrix.os == 'windows-latest' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" src-tauri/target/release/bundle/portable/*.zip --clobber
